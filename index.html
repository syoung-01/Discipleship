<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="말씀" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#111111" media="(prefers-color-scheme: dark)" />
  <title>오늘의 말씀</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .container {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .title {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: #999;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      box-shadow: 0 2px 24px rgba(0,0,0,0.07);
      text-align: center;
      min-height: 240px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1.25rem;
      cursor: pointer;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.25s, transform 0.25s;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .card.fade {
      opacity: 0;
      transform: translateY(10px);
    }

    .ref {
      font-size: 14px;
      font-weight: 600;
      color: #a0845c;
      letter-spacing: 0.04em;
    }

    .verse {
      font-size: 19px;
      line-height: 1.85;
      color: #1a1a1a;
      word-break: keep-all;
      transition: color 0.3s;
    }

    .counter {
      font-size: 12px;
      color: #ccc;
    }

    .btn {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .btn:active { transform: scale(0.97); background: #333; }
    
    .word {
      visibility: hidden;
    }

    .word.visible {
      visibility: visible;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #111; }
      .card { background: #1e1e1e; box-shadow: 0 2px 24px rgba(0,0,0,0.4); }
      .verse { color: #666; }
      .counter { color: #444; }
      .btn { background: #f0f0f0; color: #111; }
      .btn:active { background: #ccc; }
    }
  </style>
</head>

<body>
  <div class="container">
    <p class="title">상반기 랜덤 성구</p>
    <div class="card" id="card"></div>
    <button class="btn" onclick="showRandom()">다른 말씀 보기</button>
  </div>

  <script>
    const verses = [
      { ref: "롬10:10", verse: "사람이 마음으로 믿어 의에 이르고 입으로 시인하여 구원에 이르느니라" },
      { ref: "마16:16", verse: "시몬 베드로가 대답하여 이르되 주는 그리스도시요 살아 계신 하나님의 아들이시니이다" },
      { ref: "슥4:6b", verse: "만군의 여호와께서 말씀하시되 이는 힘으로 되지 아니하며 능력으로 되지 아니하고 오직 나의 영으로 되느니라" },
      { ref: "엡4:13", verse: "우리가 다 하나님의 아들을 믿는 것과 아는 일에 하나가 되어 온전한 사람을 이루어 그리스도의 장성한 분량이 충만한 데까지 이르리니" },
      { ref: "막10:45", verse: "인자가 온 것은 섬김을 받으려 함이 아니라 도리어 섬기려 하고 자기 목숨을 많은 사람의 대속물로 주려 함이니라" },
      { ref: "갈6:14", verse: "그러나 내게는 우리 주 예수 그리스도의 십자가 외에 결코 자랑할 것이 없으니 그리스도로 말미암아 세상이 나를 대하여 십자가에 못 박히고 내가 또한 세상을 대하여 그러하니라" },
      { ref: "수1:8", verse: "이 율법책을 네 입에서 떠나지 말게 하며 주야로 그것을 묵상하여 그 안에 기록된 대로 다 지켜 행하라 그리하면 네 길이 평탄하게 될 것이며 네가 형통하리라" },
      { ref: "마4:4", verse: "예수께서 대답하여 이르시되 기록되었으되 사람이 떡으로만 살 것이 아니요 하나님의 입으로부터 나오는 모든 말씀으로 살 것이라 하였느니라 하시니" },
      { ref: "빌4:6-7", verse: "아무 것도 염려하지 말고 다만 모든 일에 기도와 간구로 너희 구할 것을 감사함으로 하나님께 아뢰라 그리하면 모든 지각에 뛰어난 하나님의 평강이 그리스도 예수 안에서 너희 마음과 생각을 지키시리라" },
      { ref: "마6:33", verse: "그런즉 너희는 먼저 그의 나라와 그의 의를 구하라 그리하면 이 모든 것을 너희에게 더하시리라" },
      { ref: "벧후1:21", verse: "예언은 언제든지 사람의 뜻으로 낸 것이 아니요 오직 성령의 감동하심을 받은 사람들이 하나님께 받아 말한 것임이라" },
      { ref: "딤후3:16", verse: "모든 성경은 하나님의 감동으로 된 것으로 교훈과 책망과 바르게 함과 의로 교육하기에 유익하니" },
      { ref: "대상29:11", verse: "여호와여 위대하심과 권능과 영광과 승리와 위엄이 다 주께 속하였사오니 천지에 있는 것이 다 주의 것이로소이다 여호와여 주권도 주께 속하였사오니 주는 높으사 만물의 머리이심이니이다" },
      { ref: "사43:21", verse: "이 백성은 내가 나를 위하여 지었나니 나를 찬송하게 하려 함이니라" },
      { ref: "계3:20", verse: "볼지어다 내가 문 밖에 서서 두드리노니 누구든지 내 음성을 듣고 문을 열면 내가 그에게로 들어가 그와 더불어 먹고 그는 나와 더불어 먹으리라" },
      { ref: "롬3:23", verse: "모든 사람이 죄를 범하였으매 하나님의 영광에 이르지 못하더니" },
      { ref: "딛3:5", verse: "우리를 구원하시되 우리가 행한 바 의로운 행위로 말미암지 아니하고 오직 그의 긍휼하심을 따라 중생의 씻음과 성령의 새롭게 하심으로 하셨나니" },
      { ref: "엡2:8-9", verse: "너희는 그 은혜에 의하여 믿음으로 말미암아 구원을 받았으니 이것은 너희에게서 난 것이 아니요 하나님의 선물이라 행위에서 난 것이 아니니 이는 누구든지 자랑하지 못하게 함이라" },
      { ref: "갈5:22-23", verse: "오직 성령의 열매는 사랑과 희락과 화평과 오래 참음과 자비와 양선과 충성과 온유와 절제니 이같은 것을 금지할 법이 없느니라" },
      { ref: "고전3:16", verse: "너희는 너희가 하나님의 성전인 것과 하나님의 성령이 너희 안에 계시는 것을 알지 못하느냐" },
      { ref: "히2:18", verse: "그가 시험을 받아 고난을 당하셨은즉 시험 받는 자들을 능히 도우실 수 있느니라" },
      { ref: "마24:14", verse: "이 천국 복음이 모든 민족에게 증언되기 위하여 온 세상에 전파되리니 그제야 끝이 오리라" },
      { ref: "요13:34-35", verse: "새 계명을 너희에게 주노니 서로 사랑하라 내가 너희를 사랑한 것 같이 너희도 서로 사랑하라 너희가 서로 사랑하면 이로써 모든 사람이 너희가 내 제자인 줄 알리라" },
      { ref: "롬5:8", verse: "우리가 아직 죄인 되었을 때에 그리스도께서 우리를 위하여 죽으심으로 하나님께서 우리에 대한 자기의 사랑을 확증하셨느니라" },
    ];

    let lastIndex = -1;
    let revealStep = 0;

    function showRandom() {
      let idx;
      do { idx = Math.floor(Math.random() * verses.length); } while (verses.length > 1 && idx === lastIndex);
      lastIndex = idx;

      revealStep = 0;

      const card = document.getElementById('card');
      card.classList.add('fade');

      setTimeout(() => {
      const words = verses[idx].verse.split(' ');

      card.innerHTML = `
        <p class="ref">${verses[idx].ref}</p>
        <p class="verse">
          ${words.map(w => `<span class="word">${w}</span>`).join(' ')}
        </p>
        <p class="counter">전체 ${verses.length}개 중 ${idx + 1}번째</p>
      `;

      card.classList.remove('fade');
    }, 200);
    }

    document.getElementById('card').addEventListener('click', function () {
    const wordEls = document.querySelectorAll('.word');
    if (!wordEls.length) return;

    const words = verses[lastIndex].verse.split(' ');

    if (revealStep === 0) {

      if (words[0].length === 1 && wordEls.length > 1) {
        wordEls[0].classList.add('visible');
        wordEls[1].classList.add('visible');
      } else {
        wordEls[0].classList.add('visible');
      }

      revealStep = 1;

    } else if (revealStep === 1) {
      wordEls.forEach(el => el.classList.add('visible'));
      revealStep = 2;
    }
  });

    showRandom();
  </script>
</body>
</html>
